; 扫题挂件固件 — YD-ESP32-23 (ESP32-S3-WROOM-1-N16R8)
; 默认：全部真实硬件驱动，接线完成后直接烧录即用

[platformio]
default_envs = esp32s3-devkitc-1

[env:esp32s3-devkitc-1]
extra_scripts = pre:scripts/patch_sccb_probe.py
platform = espressif32 @ ^6.9.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
lib_ldf_mode = chain+
build_src_filter = +<*> -<bridge_main.cpp>

board_build.partitions = default_16MB.csv
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_upload.flash_size = 16MB

build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DCORE_DEBUG_LEVEL=0
    -DUSER_SETUP_LOADED=1
    -DST7789_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=240
    -DTFT_MOSI=1
    -DTFT_SCLK=3
    -DTFT_CS=38
    -DTFT_DC=39
    -DTFT_RST=40
    -DTFT_BL=41
    -DUSE_HSPI_PORT=1
    -DTFT_BACKLIGHT_ON=HIGH
    -DTFT_RGB_ORDER=TFT_RGB
    -DTFT_INVERSION_OFF
    -DSPI_FREQUENCY=20000000
    -DTOUCH_CS=-1
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DSMOOTH_FONT=1
    -DUSB_STREAM_SKIP_MODEM_ON_BOOT=0
    -DUSB_STREAM_BAUD=115200

; upload_port 自动检测（CH343 或原生 USB 均可）
monitor_dtr = 0
monitor_rts = 0

lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    espressif/esp32-camera@^2.0.4
; 中文字库：lib/U8g2_for_TFT_eSPI（本地 vendored）

; 屏幕未接时联调摄像头/4G（仅 mock 显示）
[env:esp32s3-devkitc-1-nolcd]
extends = env:esp32s3-devkitc-1
monitor_speed = 921600
board_build.sdkconfig.defaults = config/sdkconfig.defaults
build_flags =
    ${env:esp32s3-devkitc-1.build_flags}
    -DUSE_MOCK_DISPLAY=1
    -DCORE_DEBUG_LEVEL=0
    -DUSB_STREAM_ENABLE=1
    -DUSB_STREAM_SKIP_MODEM_ON_BOOT=1
    -DSTREAM_ENABLE=0
    -Wl,--exclude-libs=libesp32-camera.a

; 4G/SIM 联调：mock 屏，启动即初始化 A7670，串口 115200
[env:esp32s3-devkitc-1-4gtest]
extends = env:esp32s3-devkitc-1
monitor_speed = 115200
board_build.sdkconfig.defaults = config/sdkconfig.defaults
build_flags =
    ${env:esp32s3-devkitc-1.build_flags}
    -DUSE_MOCK_DISPLAY=1
    -DCORE_DEBUG_LEVEL=0
    -DUSB_STREAM_ENABLE=0
    -DUSB_STREAM_SKIP_MODEM_ON_BOOT=0
    -DSTREAM_ENABLE=0
    -DCELL_APN=\"cmiot\"
    -Wl,--exclude-libs=libesp32-camera.a

; 仅开发板、无外设时用 mock 流程调试
[env:esp32s3-devkitc-1-mock]
extends = env:esp32s3-devkitc-1
build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DCORE_DEBUG_LEVEL=0
    -DUSE_MOCK_DISPLAY=1
    -DUSE_MOCK_CAMERA=1
    -DUSE_MOCK_MODEM=1
lib_deps =

; 4G 模块单独透传：电脑直接发 AT（模块需独立 5V）
[env:esp32s3-modem-bridge]
extends = env:esp32s3-devkitc-1
monitor_speed = 115200
build_src_filter = +<bridge_main.cpp>
build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DCORE_DEBUG_LEVEL=0
lib_deps =
