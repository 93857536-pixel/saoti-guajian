name: SaotiCompanion
options:
  bundleIdPrefix: com.saoti
  deploymentTarget:
    iOS: "16.0"
    macOS: "13.0"
    watchOS: "9.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    CURRENT_PROJECT_VERSION: 2
    MARKETING_VERSION: "1.0.0"
    DEVELOPMENT_TEAM: "4B7F8BR8R4"
    CODE_SIGN_STYLE: Automatic
    ENABLE_PREVIEWS: YES

targets:
  SaotiCompanion:
    type: application
    platform: iOS
    sources:
      - path: Shared
      - path: App
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.saoti.companion
        INFOPLIST_FILE: App/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
    dependencies:
      - target: SaotiWatch
        embed: true
    scheme:
      testTargets: []

  SaotiCompanionMac:
    type: application
    platform: macOS
    sources:
      - path: Shared
        excludes:
          - WatchBridge.swift
      - path: App
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.saoti.companion.mac
        INFOPLIST_FILE: App/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: ["$(inherited)", "@executable_path/../Frameworks"]
        MACOSX_DEPLOYMENT_TARGET: "13.0"

  SaotiWatch:
    type: application
    platform: watchOS
    sources:
      - path: WatchApp
      - path: Shared/DeviceModel.swift
      - path: Shared/WatchBridge.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.saoti.companion.watchkitapp
        INFOPLIST_FILE: WatchApp/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SKIP_INSTALL: YES

schemes:
  SaotiCompanion:
    build:
      targets:
        SaotiCompanion: all
        SaotiWatch: all
    run:
      config: Debug
  SaotiCompanionMac:
    build:
      targets:
        SaotiCompanionMac: all
    run:
      config: Debug
  SaotiWatch:
    build:
      targets:
        SaotiWatch: all
    run:
      config: Debug
