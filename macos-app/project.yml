name: SaotiCam
options:
  bundleIdPrefix: com.saoti
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"

targets:
  SaotiCam:
    type: application
    platform: macOS
    sources:
      - path: SaotiCam
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.saoti.SaotiCam
        INFOPLIST_FILE: SaotiCam/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0.0
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        ENABLE_PREVIEWS: YES
